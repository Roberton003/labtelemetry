name: django

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python labtelemetry/manage.py check

      - name: Django migrations dry run
        run: python labtelemetry/manage.py makemigrations --check --dry-run

      - name: Django tests
        run: python labtelemetry/manage.py test telemetry -v 1
