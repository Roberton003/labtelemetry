<div class="col-md-3">
  <div class="lt-metric-card">
    <div class="lt-metric-label">Sensores</div>
    <div class="lt-metric-value">{{ total_sensors }}</div>
    <div class="lt-metric-trend stable">Ativos no sistema</div>
  </div>
</div>
<div class="col-md-3">
  <div class="lt-metric-card">
    <div class="lt-metric-label">Leituras</div>
    <div class="lt-metric-value">{{ total_readings }}</div>
    <div class="lt-metric-trend stable">Registros totais</div>
  </div>
</div>
<div class="col-md-3">
  <div class="lt-metric-card">
    <div class="lt-metric-label">Alertas</div>
    <div class="lt-metric-value">{{ active_alerts }}</div>
    <div class="lt-metric-trend {% if active_alerts > 0 %}down{% else %}stable{% endif %}">
      {% if active_alerts > 0 %}Atenção necessária{% else %}Nenhum ativo{% endif %}
    </div>
  </div>
</div>
<div class="col-md-3">
  <div class="lt-metric-card">
    <div class="lt-metric-label">Última Leitura</div>
    <div class="lt-metric-value lt-metric-value--timestamp">{{ last_reading.timestamp|default:"---" }}</div>
    <div class="lt-metric-trend stable">Timestamp mais recente</div>
  </div>
</div>
