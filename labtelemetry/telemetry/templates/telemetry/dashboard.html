<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabTelemetry — Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand mb-0 h1">LabTelemetry</span>
      <div>
        <span class="badge bg-info" id="summary-counts"
              hx-get="/api/summary/" hx-trigger="every 10s" hx-swap="innerHTML">
          ---
        </span>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="row mb-3">
      <div class="col">
        <h2>Dashboard</h2>
      </div>
    </div>

    <div class="row g-3 mb-4" id="summary-cards"
         hx-get="/dashboard/cards/" hx-trigger="every 10s" hx-swap="innerHTML">
    </div>

    <div class="row mb-4">
      <div class="col-12">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Leituras (Tempo Real)</h5>
            <div style="position:relative;height:250px;">
              <canvas id="readingsChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <ul class="nav nav-tabs mb-3" id="dashboardTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="readings-tab" data-bs-toggle="tab"
                data-bs-target="#readings" type="button" role="tab">Leituras Recentes</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="alerts-tab" data-bs-toggle="tab"
                data-bs-target="#alerts" type="button" role="tab">Alertas Ativos</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="sensors-tab" data-bs-toggle="tab"
                data-bs-target="#sensors" type="button" role="tab">Sensores</button>
      </li>
    </ul>

    <div class="tab-content" id="dashboardTabContent">
      <div class="tab-pane fade show active" id="readings" role="tabpanel">
        <div hx-get="/dashboard/readings/" hx-trigger="load, every 10s" hx-swap="innerHTML">
          <div class="text-center py-4"><div class="spinner-border"></div></div>
        </div>
      </div>
      <div class="tab-pane fade" id="alerts" role="tabpanel">
        <div hx-get="/dashboard/alerts/" hx-trigger="load, every 10s" hx-swap="innerHTML">
          <div class="text-center py-4"><div class="spinner-border"></div></div>
        </div>
      </div>
      <div class="tab-pane fade" id="sensors" role="tabpanel">
        <div hx-get="/dashboard/sensors/" hx-trigger="load, every 10s" hx-swap="innerHTML">
          <div class="text-center py-4"><div class="spinner-border"></div></div>
        </div>
      </div>
    </div>
  </div>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const COLORS = [
      '#0d6efd','#dc3545','#198754','#ffc107','#6f42c1',
      '#fd7e14','#20c997','#e83e8c','#17a2b8','#6610f2'
    ];
    let chartInstance = null;

    function loadReadingsChart() {
      fetch('/api/readings/recent/?limit=50')
        .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(function(data) {
          var groups = {};
          data.forEach(function(r) {
            if (!groups[r.parameter]) groups[r.parameter] = [];
            groups[r.parameter].push({ x: new Date(r.timestamp).getTime(), y: r.value });
          });

          var datasets = Object.entries(groups).map(function(e, i) {
            return {
              label: e[0],
              data: e[1],
              borderColor: COLORS[i % COLORS.length],
              backgroundColor: COLORS[i % COLORS.length] + '22',
              tension: 0.2,
              pointRadius: 3
            };
          });

          var ctx = document.getElementById('readingsChart').getContext('2d');
          if (chartInstance) chartInstance.destroy();
          chartInstance = new Chart(ctx, {
            type: 'line',
            data: { datasets: datasets },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: {
                x: { type: 'time', time: { tooltipFormat: 'dd/MM HH:mm' }, title: { display: true, text: 'Tempo' } },
                y: { beginAtZero: false, title: { display: true, text: 'Valor' } }
              },
              plugins: {
                legend: { position: 'top' },
                tooltip: { callbacks: { label: function(ctx) { return ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(2); } } }
              }
            }
          });
        })
        .catch(function(err) { console.error('Chart error:', err); });
    }

    loadReadingsChart();
    setInterval(loadReadingsChart, 30000);
  });
  </script>
</body>
</html>
