{% for name, info in sources %}
<div class="lt-source-status">
  <span class="lt-status-indicator {% if info.status == 'ok' or info.status == 'connected' %}ok{% elif info.status == 'unavailable' %}warning{% else %}error{% endif %}"></span>
  <div>
    <div class="lt-source-name">{{ info.name|title }}</div>
    <div class="lt-source-detail">
      Última leitura: {{ info.last_read|default:"---" }}
      {% if info.reason %} · {{ info.reason }}{% endif %}
    </div>
  </div>
</div>
{% empty %}
<div class="lt-empty">Nenhuma fonte configurada.</div>
{% endfor %}
