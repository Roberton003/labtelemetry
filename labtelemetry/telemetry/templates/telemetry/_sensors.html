{% if sensors %}
<table class="table table-striped table-sm">
  <thead>
    <tr><th>Nome</th><th>Parâmetro</th><th>Status</th><th>Calibração</th></tr>
  </thead>
  <tbody>
    {% for s in sensors %}
    <tr>
      <td>{{ s.name }}</td>
      <td>{{ s.get_parameter_display }}</td>
      <td><span class="badge bg-{% if s.status == 'HEALTHY' %}success{% elif s.status == 'DRIFTING' %}warning{% else %}danger{% endif %}">{{ s.get_status_display }}</span></td>
      <td>{{ s.calibration_factor|floatformat:2 }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="text-muted">Nenhum sensor cadastrado.</p>
{% endif %}
