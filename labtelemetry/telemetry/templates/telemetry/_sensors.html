{% if sensors %}
<table class="lt-table">
  <thead>
    <tr><th>Nome</th><th>Parâmetro</th><th>Status</th><th>Calibração</th></tr>
  </thead>
  <tbody>
    {% for s in sensors %}
    <tr>
      <td>{{ s.name }}</td>
      <td>{{ s.get_parameter_display }}</td>
      <td><span class="lt-badge {% if s.status == 'HEALTHY' %}lt-badge-normal{% elif s.status == 'DRIFTING' %}lt-badge-warning{% else %}lt-badge-danger{% endif %}">{{ s.get_status_display }}</span></td>
      <td>{{ s.calibration_factor|floatformat:2 }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<div class="lt-empty">Nenhum sensor cadastrado.</div>
{% endif %}
