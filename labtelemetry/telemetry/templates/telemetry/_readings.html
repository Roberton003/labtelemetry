{% if readings %}
<table class="table table-striped table-sm">
  <thead>
    <tr><th>Sensor</th><th>Valor</th><th>Status</th><th>Timestamp</th></tr>
  </thead>
  <tbody>
    {% for r in readings %}
    <tr>
      <td>{{ r.sensor.name }}</td>
      <td>{{ r.calibrated_value|floatformat:2 }}</td>
      <td><span class="badge bg-{% if r.status == 'NORMAL' %}success{% elif r.status == 'OUT_OF_BOUNDS' %}danger{% else %}warning{% endif %}">{{ r.status }}</span></td>
      <td>{{ r.timestamp|date:"d/m H:i:s" }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="text-muted">Nenhuma leitura registrada.</p>
{% endif %}
