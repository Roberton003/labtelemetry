{% if readings %}
<table class="lt-table">
  <thead>
    <tr><th>Sensor</th><th>Valor</th><th>Status</th><th>Timestamp</th></tr>
  </thead>
  <tbody>
    {% for r in readings %}
    <tr>
      <td>{{ r.sensor.name }}</td>
      <td>{{ r.calibrated_value|floatformat:2 }}</td>
      <td><span class="lt-badge {% if r.status == 'NORMAL' %}lt-badge-normal{% elif r.status == 'OUT_OF_BOUNDS' %}lt-badge-danger{% else %}lt-badge-warning{% endif %}">{{ r.status }}</span></td>
      <td>{{ r.timestamp|date:"d/m H:i:s" }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<div class="lt-empty">Nenhuma leitura registrada.</div>
{% endif %}
