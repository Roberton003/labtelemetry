{% if alerts %}
<table class="lt-table">
  <thead>
    <tr><th>Sensor</th><th>Mensagem</th><th>Desde</th></tr>
  </thead>
  <tbody>
    {% for a in alerts %}
    <tr>
      <td>{{ a.sensor.name }}</td>
      <td>{{ a.message }}</td>
      <td>{{ a.timestamp|date:"d/m H:i:s" }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<div class="lt-empty">Nenhum alerta ativo.</div>
{% endif %}
