{% if alerts %}
<table class="table table-striped table-sm">
  <thead>
    <tr><th>Sensor</th><th>Mensagem</th><th>Desde</th></tr>
  </thead>
  <tbody>
    {% for a in alerts %}
    <tr>
      <td>{{ a.sensor.name }}</td>
      <td>{{ a.message }}</td>
      <td>{{ a.timestamp|date:"d/m H:i:s" }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="text-muted">Nenhum alerta ativo.</p>
{% endif %}
